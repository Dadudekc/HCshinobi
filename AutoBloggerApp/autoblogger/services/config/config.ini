[model]
name = gpt-3.5-turbo
temperature = 0.7
max_tokens = 1000

[generation]
min_length = 100
max_length = 2000
top_p = 0.9
frequency_penalty = 0.5
presence_penalty = 0.5

[vector_store]
dimension = 1536
index_type = L2
nlist = 100

[logging]
level = INFO
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
file = logs/blog_generator.log

[wordpress]
url = https://your-wordpress-site.com
user = your_wp_user
password = your_wp_password 